<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page moved | Nikhil Togadiya</title>

  <!-- GitHub Pages serves this file for any unmatched path on the whole domain.
       It is the safety net for stale links published before the repo rename. -->

  <link rel="icon" href="https://github.com/Nikhiltogadiya.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet" />

  <script>
    // Honour the theme the visitor already chose on the main site.
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>

  <style>
    :root {
      --primary:      #3B82F6;
      --primary-dark: #2563EB;
      --bg-main:      #FAFBFC;
      --bg-card:      #FFFFFF;
      --text-primary: #1E293B;
      --text-secondary: #475569;
      --text-muted:   #94A3B8;
      --border:       #E2E8F0;
    }
    [data-theme="dark"] {
      --primary:      #22d3ee;
      --primary-dark: #00c4cc;
      --bg-main:      #0f172a;
      --bg-card:      #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted:   #94a3b8;
      --border:       #334155;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      line-height: 1.6;
    }

    .card {
      max-width: 32rem;
      width: 100%;
      padding: 3rem 2.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08), 0 4px 8px rgba(0,0,0,0.04);
      text-align: center;
    }

    .code {
      font-family: 'Fira Code', monospace;
      font-size: 3.5rem;
      font-weight: 600;
      color: var(--primary);
      line-height: 1;
    }

    h1 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 0.5rem; }

    p { color: var(--text-secondary); margin-bottom: 0.75rem; }

    .path {
      display: inline-block;
      max-width: 100%;
      overflow-wrap: anywhere;
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
      background: var(--bg-main);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.35rem 0.6rem;
      margin-bottom: 1.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.8rem 1.75rem;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      border-radius: 12px;
      transition: background 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn:hover { background: var(--primary-dark); }

    .note { font-size: 0.85rem; color: var(--text-muted); margin: 1.5rem 0 0; }
  </style>
</head>
<body>
  <main class="card">
    <div class="code">404</div>
    <h1>This page has moved</h1>
    <p>The portfolio now lives at the root of this domain.</p>
    <span class="path" id="requested-path"></span>
    <p><a class="btn" href="/">Go to the portfolio &rarr;</a></p>
    <p class="note">Redirecting automatically in <span id="countdown">5</span>s&hellip;</p>
  </main>

  <script>
    document.getElementById('requested-path').textContent = location.pathname;

    // Old deep links under the previous project-site path go straight home —
    // no reason to make those visitors wait.
    if (/^\/Nikhiltogadiya\/?/i.test(location.pathname)) {
      location.replace('/' + location.search + location.hash);
    } else {
      // Everything else gets a readable message first, then a gentle bounce.
      var left = 5;
      var el = document.getElementById('countdown');
      setInterval(function () {
        left -= 1;
        if (left <= 0) { location.replace('/'); return; }
        el.textContent = left;
      }, 1000);
    }
  </script>
</body>
</html>
