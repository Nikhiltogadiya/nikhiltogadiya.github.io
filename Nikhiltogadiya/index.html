<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- This page exists only to rescue the old GitHub Pages URL.
       The site used to live at  nikhiltogadiya.github.io/Nikhiltogadiya/
       After the repo was renamed to nikhiltogadiya.github.io it lives at the root.
       GitHub does NOT redirect old project-site URLs, so we do it ourselves. -->

  <title>Redirecting to nikhiltogadiya.github.io</title>

  <!-- Tells search engines the new URL is the real one, so ranking transfers. -->
  <link rel="canonical" href="https://nikhiltogadiya.github.io/" />

  <!-- No-JS fallback. Fires immediately. -->
  <meta http-equiv="refresh" content="0; url=https://nikhiltogadiya.github.io/" />

  <script>
    // Runs before render, so nothing below is normally seen.
    // replace() keeps the old URL out of history — Back then works as expected.
    // search + hash are carried across so deep links like /Nikhiltogadiya/#projects survive.
    location.replace('/' + location.search + location.hash);
  </script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FAFBFC;
      color: #1E293B;
      text-align: center;
      padding: 2rem;
    }
    a { color: #3B82F6; }
  </style>
</head>
<body>
  <main>
    <p>This page has moved.</p>
    <p><a href="https://nikhiltogadiya.github.io/">Continue to nikhiltogadiya.github.io &rarr;</a></p>
  </main>
</body>
</html>
